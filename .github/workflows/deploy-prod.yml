name: Deploy AXKG to prod (homeserver)

# ax-graph 운영 배포 — api + worker 를 GHCR 로 빌드/push 후 홈서버 SSH 로 compose up.
#   실행 순서(사용자 확정):
#     build & push(GHCR) → 서버 SSH 접속 → .env 생성(GitHub Secret ENV_PROD 복사) →
#     docker-compose.prod.yml 다운 → docker compose pull + up → alembic upgrade + seeds
#
# 트리거: workflow_dispatch(수동)만. push 트리거는 사용자 결정 전이라 넣지 않는다.
#   FE(apps/web) 배포는 범위 제외 — 이미지 빌드/compose 에 web 없음.
#
# ── 필요한 GitHub Secrets ────────────────────────────────────────────────────
#   ENV_PROD        : 서버 .env 파일 내용 통째(위 필수 키 전부; compose 주석 참고)
#   PROD_SSH_HOST   : 홈서버 호스트/IP
#   PROD_SSH_USER   : SSH 사용자 (예: kknaks)
#   PROD_SSH_KEY    : SSH private key (PEM)
#   (GITHUB_TOKEN 은 자동 제공 — GHCR push/pull + private repo raw 다운로드에 사용)
# ────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'GHCR image tag (default: latest) — 롤백 시 이전 SHA 입력'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  OWNER: kknaks
  # TODO(user): 서버 아키텍처 확인 후 조정. 홈서버가 arm64 면 linux/arm64 로 변경.
  PLATFORM: linux/amd64
  DEPLOY_DIR: ~/ax-graph

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # api — dev Dockerfile 그대로(신규 Dockerfile 만들지 않음). context = apps/api.
      - name: Build & push api
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ax-graph-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ax-graph-api:latest
          cache-from: type=gha,scope=ax-graph-api
          cache-to: type=gha,scope=ax-graph-api,mode=max

      # worker — build context = repo root (context/ SoT 를 COPY 해야 하므로 dev 와 동일).
      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/worker/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ax-graph-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ax-graph-worker:latest
          cache-from: type=gha,scope=ax-graph-worker
          cache-to: type=gha,scope=ax-graph-worker,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      # Step 1 — 배포 디렉토리 준비
      - name: 1) Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: DEPLOY_DIR
          script: |
            mkdir -p $DEPLOY_DIR
            chmod 700 $DEPLOY_DIR

      # Step 2 — .env 작성 (GitHub Secret ENV_PROD heredoc + IMAGE_TAG override)
      #   secret 이름 오탈자 주의: ENV_PROD (필요 키는 docker-compose.prod.yml 상단 주석 참고)
      - name: 2) Write .env
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
          # 기본 push = latest. workflow_dispatch image_tag 입력 시 그 SHA(롤백).
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: ENV_PROD,IMAGE_TAG,DEPLOY_DIR
          script: |
            cd $DEPLOY_DIR
            cat > .env <<EOF
            $ENV_PROD
            IMAGE_TAG=$IMAGE_TAG
            EOF
            chmod 600 .env

      # Step 3 — docker-compose.prod.yml 을 이 SHA 기준으로 다운로드
      #   GH raw + Bearer 토큰(사설 레포 인증) — ERP 선례 미러. checkout+scp 대안도 가능.
      - name: 3) Fetch docker-compose.prod.yml from GH raw
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: GH_TOKEN,REPO,SHA,DEPLOY_DIR
          script: |
            cd $DEPLOY_DIR
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3.raw" \
              -o docker-compose.prod.yml \
              "https://raw.githubusercontent.com/$REPO/$SHA/docker-compose.prod.yml"

      # Step 4 — pull + up + migration/seeds (둘 다 멱등: 신규 초기화·재배포 공용)
      - name: 4) pull + up + migrate + seed
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ env.OWNER }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: GH_TOKEN,OWNER,DEPLOY_DIR
          script: |
            cd $DEPLOY_DIR
            echo "$GH_TOKEN" | docker login ghcr.io -u "$OWNER" --password-stdin
            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
            # api 기동 대기 후 스키마/시드(멱등). compose command 에도 alembic 있으나 명시 재보장.
            docker compose --env-file .env -f docker-compose.prod.yml exec -T api alembic upgrade head
            docker compose --env-file .env -f docker-compose.prod.yml exec -T api python -m axkg.seeds
            # ax-graph 이미지의 dangling(<none>) 만 정리 — 다른 프로젝트 이미지 보호
            docker images --filter "reference=ghcr.io/$OWNER/ax-graph-*" --filter "dangling=true" -q | xargs -r docker rmi
            docker logout ghcr.io
